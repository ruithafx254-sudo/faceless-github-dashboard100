<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f6f7fb;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

/* HEADER */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.search {
    flex: 1;
    background: #e9ecf3;
    border-radius: 20px;
    padding: 10px;
    margin: 0 10px;
    color: gray;
}

/* WALLET */
.wallet {
    background: white;
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.balance {
    font-size: 28px;
    font-weight: 600;
}

.sub {
    color: gray;
    font-size: 13px;
}

/* ACTIONS */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.action {
    text-align: center;
    flex: 1;
}

.circle {
    background: #eef1f7;
    padding: 15px;
    border-radius: 15px;
    margin: 5px;
    cursor: pointer;
    font-size: 18px;
}

/* TABS */
.tabs {
    display: flex;
    margin-top: 20px;
    font-weight: 600;
}

.tabs div {
    margin-right: 20px;
    padding-bottom: 5px;
}

.active-tab {
    border-bottom: 3px solid #3b5cff;
}

/* CRYPTO */
.crypto {
    background: white;
    margin-top: 10px;
    padding: 15px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
}

/* PENDING */
.pending {
    background: #fff3cd;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 13px;
}

/* MODAL */
.modal {
    position: fixed;
    bottom: -100%;
    left: 0;
    right: 0;
    background: white;
    padding: 20px;
    border-radius: 25px 25px 0 0;
    transition: 0.3s;
}

.modal.active {
    bottom: 0;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: #3b5cff;
    color: white;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- TOP -->
    <div class="top">
        ⚙️
        <div class="search">Search</div>
        📊
    </div>

    <!-- WALLET -->
    <div class="wallet">
        <div class="balance">$<span id="balance">0.00</span></div>
        <div class="sub">Demo Wallet</div>

        <div class="actions">
            <div class="action">
                <div class="circle" onclick="openModal('send')">⬆️</div>
                <small>Send</small>
            </div>
            <div class="action">
                <div class="circle">⬇️</div>
                <small>Receive</small>
            </div>
            <div class="action">
                <div class="circle">🔄</div>
                <small>Swap</small>
            </div>
            <div class="action">
                <div class="circle" onclick="openModal('buy')">➕</div>
                <small>Buy</small>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="active-tab">Crypto</div>
        <div>Watchlist</div>
        <div>NFTs</div>
    </div>

    <!-- CRYPTO -->
    <div class="crypto">
        <div>
            <strong>USDT</strong><br>
            <span class="sub">Demo Token</span>
        </div>
        <div>$<span id="balance2">0.00</span></div>
    </div>

    <!-- PENDING -->
    <div id="pendingBox"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <h3 id="title"></h3>

    <input type="number" id="amount" placeholder="Enter amount">

    <select id="time">
        <option value="5">5 sec</option>
        <option value="10">10 sec</option>
        <option value="30">30 sec</option>
        <option value="60">1 min</option>
        <option value="120">2 min</option>
    </select>

    <button onclick="confirmAction()">Confirm</button>
</div>

<script>
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let currentAction = "";

function updateUI() {
    document.getElementById("balance").innerText = balance.toFixed(2);
    document.getElementById("balance2").innerText = balance.toFixed(2);
    localStorage.setItem("balance", balance);
}

function openModal(type) {
    currentAction = type;
    document.getElementById("title").innerText = type.toUpperCase();
    document.getElementById("modal").classList.add("active");
}

function closeModal() {
    document.getElementById("modal").classList.remove("active");
}

function confirmAction() {
    let amount = parseFloat(document.getElementById("amount").value);
    let time = parseInt(document.getElementById("time").value);

    if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
    }

    let box = document.getElementById("pendingBox");

    let div = document.createElement("div");
    div.className = "pending";

    let seconds = time;

    let interval = setInterval(() => {
        div.innerText = `${currentAction.toUpperCase()} $${amount} pending... (${seconds}s)`;
        seconds--;

        if (seconds < 0) {
            clearInterval(interval);

            if (currentAction === "buy") {
                balance += amount;
            } else if (currentAction === "send") {
                balance -= amount;
                if (balance < 0) balance = 0;
            }

            div.innerText = `${currentAction.toUpperCase()} $${amount} completed`;
            updateUI();
        }

    }, 1000);

    box.appendChild(div);
