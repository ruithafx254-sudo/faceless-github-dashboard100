<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faceless Video Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 0;
}
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
h1 {
    text-align: center;
    color: #22c55e;
}
.input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
}
.input-group label {
    margin-bottom: 5px;
    font-weight: 600;
}
.input-group input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}
button {
    padding: 12px 20px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #22c55e;
    color: black;
    transition: 0.3s;
}
button:hover {
    background: #16a34a;
}
#log {
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
}
</style>
</head>
<body>

<div class="container">
<h1>Faceless Video Automation</h1>

<div class="input-group">
    <label>Topic (optional):</label>
    <input id="topic" placeholder="space, history, psychology..." />
</div>

<div class="input-group">
    <label>Number of videos per channel (1–5):</label>
    <input id="count" type="number" value="1" min="1" max="5" />
</div>

<div class="input-group">
    <label>Channels (comma-separated JSONs):</label>
    <input id="channels" placeholder="channel1.json,channel2.json" />
</div>

<button onclick="generateVideos()">Generate & Upload</button>

<h3>Log:</h3>
<div id="log"></div>
</div>

<script>
const logDiv = document.getElementById('log');

function appendLog(msg){
  const p = document.createElement('p');
  p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logDiv.appendChild(p);
  logDiv.scrollTop = logDiv.scrollHeight;
}

function generateVideos(){
  const topic = document.getElementById('topic').value;
  const count = parseInt(document.getElementById('count').value);
  const channels = document.getElementById('channels').value.split(',').map(c=>c.trim());
  
  if(!channels.length){ appendLog("Enter at least one channel JSON."); return; }

  appendLog("Starting video generation...");
  for(let i=0;i<count;i++){
    for(let channel of channels){
      appendLog(`✅ Video would be generated and uploaded to ${channel}`);
    }
  }
  appendLog("All videos generated (simulation).");
}
</script>

</body>
</html>
