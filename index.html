<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault Pro | Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#3b82f6',
                        darkBg: '#000000',
                        darkCard: '#121212',
                        lightBg: '#F3F4F6',
                        lightCard: '#FFFFFF'
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }
        .shimmer { background: linear-gradient(90deg, transparent 25%, rgba(128,128,128,0.1) 50%, transparent 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .btn-interact:active { transform: scale(0.92); opacity: 0.8; }
        .confirming-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-sheet { width: 100%; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }
    </style>
</head>
<body class="bg-lightBg dark:bg-darkBg text-gray-900 dark:text-white select-none pb-safe">

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[2000] bg-gray-900 dark:bg-white text-white dark:text-black px-6 py-3 rounded-full font-bold text-sm shadow-2xl opacity-0 transition-all duration-300 pointer-events-none"></div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col px-6">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-2xl bg-brand flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-shield-check text-white text-sm"></i>
                </div>
                <div>
                    <span class="text-[10px] font-black text-brand uppercase tracking-widest leading-none">Main Wallet</span>
                    <h2 class="text-sm font-extrabold flex items-center">Vault-01 <i class="fa-solid fa-chevron-down text-[10px] ml-1.5 opacity-30"></i></h2>
                </div>
            </div>
            <div class="flex items-center space-x-5 text-gray-400">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-gray-200 dark:bg-darkCard flex items-center justify-center btn-interact">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <i onclick="clearData()" class="fa-solid fa-circle-nodes text-lg text-red-500/40 btn-interact"></i>
            </div>
        </header>

        <section class="text-center my-4">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Total Balance</p>
            <h1 id="total-usd" class="text-5xl font-extrabold tracking-tight tabular-nums mb-10">$0.00</h1>
            
            <div class="flex justify-between px-2">
                <div class="flex flex-col items-center space-y-2" onclick="openModal('Deposit')">
                    <div class="w-14 h-14 bg-gray-900 dark:bg-white text-white dark:text-black rounded-full flex items-center justify-center text-xl btn-interact shadow-xl"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-[11px] font-black text-gray-500">BUY</span>
                </div>
                <div class="flex flex-col items-center space-y-2" onclick="openModal('Withdraw')">
                    <div class="w-14 h-14 bg-white dark:bg-darkCard text-gray-900 dark:text-white rounded-full border border-gray-200 dark:border-white/5 flex items-center justify-center text-xl btn-interact shadow-lg"><i class="fa-solid fa-arrow-up"></i></div>
                    <span class="text-[11px] font-black text-gray-500">SEND</span>
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-white dark:bg-darkCard text-gray-900 dark:text-white rounded-full border border-gray-200 dark:border-white/5 flex items-center justify-center text-xl btn-interact shadow-lg"><i class="fa-solid fa-arrow-down"></i></div>
                    <span class="text-[11px] font-black text-gray-500">RECEIVE</span>
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-white dark:bg-darkCard text-gray-900 dark:text-white rounded-full border border-gray-200 dark:border-white/5 flex items-center justify-center text-xl btn-interact shadow-lg"><i class="fa-solid fa-shuffle"></i></div>
                    <span class="text-[11px] font-black text-gray-500">SWAP</span>
                </div>
            </div>
        </section>

        <div id="asset-list" class="mt-8 space-y-3">
            <div class="shimmer h-20 w-full rounded-3xl opacity-20"></div>
        </div>

        <section class="mt-10 mb-32">
            <h3 class="font-black text-gray-400 text-[10px] uppercase tracking-[2px] mb-6">Network Activity</h3>
            <div id="tx-history" class="space-y-4"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-black/90 backdrop-blur-2xl border-t border-gray-200 dark:border-white/5 px-10 pt-4 pb-10 flex justify-between items-center z-50">
            <div class="flex flex-col items-center space-y-1 text-brand"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-black">Wallet</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-400"><i class="fa-solid fa-chart-pie text-xl"></i><span class="text-[10px] font-black">Market</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-400"><i class="fa-solid fa-compass text-xl"></i><span class="text-[10px] font-black">DApps</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-400"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] font-black">Settings</span></div>
        </nav>
    </div>

    <div id="txModal" class="modal-overlay" onclick="if(event.target == this) closeModal()">
        <div class="modal-sheet bg-white dark:bg-darkCard p-8 border-t border-gray-200 dark:border-white/10">
            <div class="w-12 h-1 bg-gray-300 dark:bg-zinc-800 rounded-full mx-auto mb-10"></div>
            <h2 id="modalTitle" class="text-3xl font-black mb-8 italic">TRANSACTION</h2>
            <div class="space-y-6">
                <div class="bg-gray-100 dark:bg-black rounded-2xl p-4">
                    <select id="assetSelect" class="w-full bg-transparent py-2 text-xl font-bold outline-none border-none text-gray-900 dark:text-white">
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="USDT">Tether (USDT)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                    </select>
                </div>
                <div class="bg-gray-100 dark:bg-black rounded-2xl p-4">
                    <div class="flex justify-between mb-4 text-[10px] font-black text-gray-400 uppercase"><span>Wait Time</span><span id="timerVal" class="text-brand">30s</span></div>
                    <input type="range" id="timerInput" min="5" max="300" value="30" class="w-full accent-brand" oninput="document.getElementById('timerVal').innerText = this.value + 's'">
                </div>
                <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-transparent text-6xl font-black text-center outline-none text-gray-900 dark:text-white mb-6">
                <button onclick="processTx()" class="w-full bg-brand text-white py-6 rounded-3xl font-black text-lg btn-interact shadow-2xl shadow-blue-500/40">BROADCAST</button>
            </div>
        </div>
    </div>

    <script>
        const PRICES = { USDT: 1, BTC: 64200, ETH: 2450 };
        let state = JSON.parse(localStorage.getItem('vault_v7')) || { balances: { USDT: 0, BTC: 0, ETH: 0 }, history: [] };
        
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.className = 'fa-solid fa-moon';
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.className = 'fa-solid fa-sun';
            }
        }

        // Initialize Theme Icon
        window.addEventListener('load', () => {
            const icon = document.getElementById('theme-icon');
            icon.className = document.documentElement.classList.contains('dark') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        });

        setInterval(checkPendingTransactions, 1000);

        function openModal(action) {
            document.getElementById('modalTitle').innerText = action.toUpperCase();
            document.getElementById('txModal').classList.add('active');
        }

        function closeModal() { document.getElementById('txModal').classList.remove('active'); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = "1"; t.style.transform = "translate(-50%, 20px)";
            setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translate(-50%, -20px)"; }, 3000);
        }

        function processTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerInput').value);
            if(!amt || amt <= 0) return;
            const now = Date.now();
            state.history.push({ id: now, type: document.getElementById('modalTitle').innerText, coin, amt, status: 'pending', date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), finishAt: now + (seconds * 1000) });
            save(); closeModal(); document.getElementById('txAmount').value = ''; showToast("Broadcasting...");
        }

        function checkPendingTransactions() {
            let changed = false; const now = Date.now();
            state.history.forEach(tx => {
                if (tx.status === 'pending' && now >= tx.finishAt) {
                    tx.status = 'confirmed';
                    state.balances[tx.coin] += (tx.type === 'DEPOSIT' || tx.type === 'BUY' ? tx.amt : -tx.amt);
                    showToast(`${tx.coin} Confirmed`); changed = true;
                }
            });
            if (changed) save(); else render();
        }

        function save() { localStorage.setItem('vault_v7', JSON.stringify(state)); render(); }

        function render() {
            let total = 0; const assetDiv = document.getElementById('asset-list'); assetDiv.innerHTML = '';
            for(let c in state.balances) {
                const val = state.balances[c] * PRICES[c]; total += val;
                assetDiv.innerHTML += `
                <div class="bg-white dark:bg-darkCard p-5 flex justify-between items-center rounded-3xl border border-gray-100 dark:border-white/5 shadow-sm">
                    <div class="flex items-center space-x-4">
                        <div class="w-11 h-11 bg-gray-100 dark:bg-black rounded-full flex items-center justify-center font-black text-[10px]">${c}</div>
                        <div><p class="font-extrabold text-sm">${c}</p><p class="text-[10px] text-gray-400">$${PRICES[c].toLocaleString()}</p></div>
                    </div>
                    <div class="text-right"><p class="font-black text-sm">${state.balances[c].toLocaleString()}</p><p class="text-[10px] text-gray-400">$${val.toLocaleString()}</p></div>
                </div>`;
            }
            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const hist = document.getElementById('tx-history');
            hist.innerHTML = state.history.length ? '' : '<div class="py-12 text-center opacity-20 text-[10px] font-black">STANDBY</div>';
            state.history.slice(-5).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                let subtext = isPending ? `CONFIRMING ${Math.min(3, Math.floor(((Date.now()-tx.id)/(tx.finishAt-tx.id))*3)+1)}/3` : 'FINALIZED';
                hist.innerHTML += `
                <div class="flex justify-between items-center py-2 border-b border-gray-100 dark:border-white/5 last:border-0">
                    <div class="flex items-center space-x-4">
                        <div class="w-9 h-9 rounded-full bg-gray-100 dark:bg-zinc-900 flex items-center justify-center text-[10px]"><i class="fa-solid ${tx.type==='DEPOSIT'?'fa-arrow-down text-green-500':'fa-arrow-up text-brand'}"></i></div>
                        <div><p class="text-[11px] font-black uppercase">${tx.type} ${tx.coin}</p><p class="text-[9px] text-gray-400">${tx.date}</p></div>
                    </div>
                    <div class="text-right"><p class="text-sm font-black ${isPending ? 'text-gray-400' : 'text-gray-900 dark:text-white'}">${tx.amt.toLocaleString()}</p><p class="${isPending ? 'confirming-pulse text-green-500 font-bold' : 'text-[9px] text-gray-400 font-black italic'}">${subtext}</p></div>
                </div>`;
            });
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
        function clearData() { if(confirm("Purge Storage?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
