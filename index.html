<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro | Live Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #0b0e11; --card: #181a20; --blue: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: flex-end; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-click:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Pulse for Incoming */
        .incoming-pulse { animation: pulse 2s infinite; font-weight: 800; color: #3b82f6; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="max-w-[450px] mx-auto px-6 pt-10 pb-32 min-h-screen">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-vault text-white text-sm"></i>
                </div>
                <h2 class="text-xs font-black tracking-widest uppercase opacity-60">Pro Terminal</h2>
            </div>
            <button onclick="wipe()" class="text-[9px] font-black opacity-30 text-red-500 uppercase">Clear All</button>
        </header>

        <section class="text-center mb-12">
            <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Portfolio Value</p>
            <h1 id="main-balance" class="text-5xl font-extrabold tracking-tighter tabular-nums">$0.00</h1>
            
            <div class="flex justify-center space-x-12 mt-10">
                <button onclick="openTx('Buy')" class="btn-click flex flex-col items-center gap-3">
                    <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-xl shadow-xl shadow-blue-500/30"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-[10px] font-black uppercase text-gray-400">Deposit</span>
                </button>
                <button onclick="openTx('Send')" class="btn-click flex flex-col items-center gap-3">
                    <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-up"></i></div>
                    <span class="text-[10px] font-black uppercase text-gray-400">Send</span>
                </button>
            </div>
        </section>

        <div id="asset-container" class="space-y-3 mb-12"></div>

        <section>
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 mb-6">Recent Activity</h3>
            <div id="history-container" class="space-y-6"></div>
        </section>
    </div>

    <div id="txModal" class="modal" onclick="if(event.target==this) closeTx()">
        <div class="modal-content">
            <div class="w-10 h-1 bg-gray-800 rounded-full mx-auto mb-8"></div>
            <h2 id="modalTitle" class="text-2xl font-black mb-8 italic uppercase">Action</h2>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <label class="text-[9px] font-black text-gray-500 block mb-1">ASSET</label>
                        <select id="assetSelect" class="bg-transparent font-bold outline-none w-full text-sm">
                            <option value="USDT">USDT (Tether)</option>
                            <option value="SOL">SOL (Solana)</option>
                            <option value="BTC">BTC (Bitcoin)</option>
                        </select>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <label class="text-[9px] font-black text-gray-500 block mb-1">TIMER: <span id="timeLabel" class="text-blue-500">30s</span></label>
                        <input type="range" id="timerRange" min="5" max="60" value="30" class="w-full accent-blue-500" oninput="document.getElementById('timeLabel').innerText = this.value + 's'">
                    </div>
                </div>

                <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                    <input type="number" id="txAmount" placeholder="0.00" class="bg-transparent w-full text-4xl font-black text-center outline-none tabular-nums">
                </div>

                <button onclick="submitTx()" class="btn-click w-full bg-blue-600 py-5 rounded-3xl font-black text-lg shadow-2xl shadow-blue-600/30">CONFIRM TRANSACTION</button>
            </div>
        </div>
    </div>

    <script>
        const PRICES = { USDT: 1, SOL: 145, BTC: 68000 };
        // Using v7 for a fresh start
        let state = JSON.parse(localStorage.getItem('vault_v7')) || { balances: { USDT: 0, SOL: 0, BTC: 0 }, history: [] };
        let mode = '';

        function openTx(m) { mode = m; document.getElementById('modalTitle').innerText = m; document.getElementById('txModal').classList.add('active'); }
        function closeTx() { document.getElementById('txModal').classList.remove('active'); }

        function submitTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerRange').value);

            if (!amt || amt <= 0) return;

            const tx = {
                id: Date.now(),
                type: mode,
                coin: coin,
                amt: amt,
                status: 'pending',
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                timeLeft: seconds,
                targetTime: Date.now() + (seconds * 1000)
            };

            state.history.push(tx);
            save();
            closeTx();
            document.getElementById('txAmount').value = '';
        }

        function save() { localStorage.setItem('vault_v7', JSON.stringify(state)); render(); }

        function render() {
            let total = 0;
            const assetBox = document.getElementById('asset-container');
            assetBox.innerHTML = '';

            for (let c in state.balances) {
                const usd = state.balances[c] * PRICES[c];
                total += usd;
                assetBox.innerHTML += `
                    <div class="glass-card p-5 rounded-3xl flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center font-black text-[10px]">${c}</div>
                            <div><p class="font-bold text-sm text-white">${c}</p><p class="text-[10px] text-gray-500 font-bold">$${PRICES[c]}</p></div>
                        </div>
                        <div class="text-right"><p class="font-black text-sm">${state.balances[c].toLocaleString()}</p><p class="text-[10px] text-gray-500 font-bold">$${usd.toLocaleString()}</p></div>
                    </div>`;
            }
            document.getElementById('main-balance').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const histBox = document.getElementById('history-container');
            histBox.innerHTML = state.history.length ? '' : '<p class="text-center py-10 text-[10px] opacity-20 font-black">NO RECENT MOVES</p>';
            
            state.history.slice(-10).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                histBox.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center">
                                <i class="fa-solid ${tx.type==='Buy'?'fa-plus text-green-500':'fa-arrow-up text-blue-500'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-xs font-black">${tx.type} ${tx.coin}</p>
                                <p class="text-[9px] text-gray-600 font-bold uppercase">${tx.timestamp}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${isPending ? 'text-white/30' : (tx.type==='Buy'?'text-green-500':'text-blue-500')}">
                                ${tx.type === 'Buy' ? '+' : '-'}${tx.amt.toLocaleString()}
                            </p>
                            ${isPending ? 
                                `<p class="text-[10px] incoming-pulse uppercase tracking-tight">Incoming: ${tx.timeLeft}s</p>` : 
                                `<p class="text-[9px] font-black text-gray-700 uppercase tracking-widest">Confirmed</p>`
                            }
                        </div>
                    </div>`;
            });
        }

        // --- THE COUNTDOWN ENGINE ---
        setInterval(() => {
            let needsSave = false;
            const now = Date.now();
            
            state.history.forEach(tx => {
                if (tx.status === 'pending') {
                    // Calculate remaining seconds
                    const diff = Math.ceil((tx.targetTime - now) / 1000);
                    tx.timeLeft = diff > 0 ? diff : 0;

                    if (tx.timeLeft <= 0) {
                        tx.status = 'confirmed';
                        state.balances[tx.coin] += (tx.type === 'Buy' ? tx.amt : -tx.amt);
                        needsSave = true;
                    }
                }
            });

            // Re-render every second to show the numbers moving
            if (needsSave) save(); else render();
        }, 1000);

        function wipe() { if(confirm("Wipe Everything?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
