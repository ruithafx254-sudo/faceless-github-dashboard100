<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay | Digital Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-10">
            <div class="text-2xl font-bold text-blue-600 tracking-tighter">NEXUS<span class="text-gray-900">PAY</span></div>
            <div class="hidden md:flex space-x-6 text-gray-600 font-medium text-sm">
                <a href="#" class="text-blue-600">Wallet</a>
                <a href="#" class="hover:text-blue-600">Swap</a>
                <a href="#" class="hover:text-blue-600">Staking</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="bg-blue-50 px-3 py-1 rounded-full text-blue-600 text-xs font-bold border border-blue-100">Mainnet</div>
            <i class="fa-solid fa-gear text-gray-400 cursor-pointer"></i>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8 pb-20">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-slate-900 p-8 rounded-[2rem] shadow-2xl text-white relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-slate-400 text-sm font-medium mb-1">Total Balance</p>
                    <h1 id="main-balance" class="text-5xl font-bold tracking-tight mb-8">$12,450.80</h1>
                    
                    <div class="flex space-x-4">
                        <button onclick="openModal('addModal')" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-2xl font-bold transition flex items-center justify-center space-x-2">
                            <i class="fa-solid fa-plus"></i><span>Buy</span>
                        </button>
                        <button onclick="openModal('withdrawModal')" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-2xl font-bold transition flex items-center justify-center space-x-2">
                            <i class="fa-solid fa-arrow-up"></i><span>Send</span>
                        </button>
                        <button class="w-14 bg-white/10 hover:bg-white/20 rounded-2xl flex items-center justify-center">
                            <i class="fa-solid fa-qrcode"></i>
                        </button>
                    </div>
                </div>
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-blue-500/20 rounded-full blur-3xl"></div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Transactions</h3>
                    <button class="text-gray-400 hover:text-blue-600 transition"><i class="fa-solid fa-sliders"></i></button>
                </div>
                <div id="transaction-list" class="divide-y divide-gray-50">
                    <div class="p-6 flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-arrow-down"></i></div>
                            <div>
                                <p class="font-bold text-gray-900">Received Bonus</p>
                                <p class="text-xs text-gray-400">Mar 23, 2026 • Completed</p>
                            </div>
                        </div>
                        <p class="font-bold text-green-500">+$1,200.00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4">Assets</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-coins"></i></div>
                            <span class="font-bold text-sm">FakeCoin (NC)</span>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold">5,000.00</p>
                            <p class="text-[10px] text-gray-400">$5,000.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="addModal" class="modal">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Add Funds</h2>
            <div class="space-y-4">
                <label class="block text-sm font-bold text-gray-500">Amount (USD)</label>
                <input type="number" id="addAmount" placeholder="0.00" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 font-bold text-xl">
                <button onclick="processAdd()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-4">Confirm Deposit</button>
                <button onclick="closeModal('addModal')" class="w-full text-gray-400 font-medium py-2">Cancel</button>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Send Assets</h2>
            <p class="text-gray-400 text-sm mb-6">Send funds to any wallet address</p>
            <div class="space-y-4">
                <label class="block text-sm font-bold text-gray-500">Recipient Address</label>
                <input type="text" id="withdrawAddr" placeholder="0x..." class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 text-sm font-mono">
                
                <label class="block text-sm font-bold text-gray-500">Amount</label>
                <input type="number" id="withdrawAmount" placeholder="0.00" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 font-bold text-xl">
                
                <button onclick="processWithdraw()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold mt-4">Withdraw Now</button>
                <button onclick="closeModal('withdrawModal')" class="w-full text-gray-400 font-medium py-2">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentBalance = 12450.80;

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function updateUI() {
            document.getElementById('main-balance').innerText = `$${currentBalance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
        }

        function addTransaction(title, amount, isPositive) {
            const list = document.getElementById('transaction-list');
            const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const html = `
                <div class="p-6 flex justify-between items-center animate-fade-in">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 ${isPositive ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} rounded-2xl flex items-center justify-center">
                            <i class="fa-solid ${isPositive ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900">${title}</p>
                            <p class="text-xs text-gray-400">${date} • Completed</p>
                        </div>
                    </div>
                    <p class="font-bold ${isPositive ? 'text-green-500' : 'text-red-500'}">
                        ${isPositive ? '+' : '-'}$${parseFloat(amount).toLocaleString()}
                    </p>
                </div>
            `;
            list.insertAdjacentHTML('afterbegin', html);
        }

        function processAdd() {
            const amt = document.getElementById('addAmount').value;
            if(amt > 0) {
                currentBalance += parseFloat(amt);
                addTransaction('Deposit via Gateway', amt, true);
                updateUI();
                closeModal('addModal');
                document.getElementById('addAmount').value = '';
            }
        }

        function processWithdraw() {
            const amt = document.getElementById('withdrawAmount').value;
            const addr = document.getElementById('withdrawAddr').value;
            if(amt > 0 && currentBalance >= amt && addr.length > 5) {
                currentBalance -= parseFloat(amt);
                addTransaction(`Sent to ${addr.substring(0,6)}...`, amt, false);
                updateUI();
                closeModal('withdrawModal');
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('withdrawAddr').value = '';
            } else {
                alert("Check balance or address!");
            }
        }
    </script>
</body>
</html>
