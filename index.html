<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: white; -webkit-tap-highlight-color: transparent; }
        .trust-green { color: #31d785; }
        .trust-bg-green { background-color: #31d785; }
        
        /* Navigation Styles */
        .nav-icon { color: #8e8e93; font-size: 20px; }
        .nav-active { color: #31d785; }
        
        /* Floating Trade Button */
        .trade-btn-container { position: relative; top: -18px; }
        .trade-btn {
            width: 54px; height: 54px; border-radius: 50%;
            background-color: #31d785; color: #000;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid #0d0d0d; box-shadow: 0 4px 12px rgba(49, 215, 133, 0.2);
        }

        /* Modal Styling */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1e; width: 100%; border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem; }

        /* Animation for Incoming Tx */
        .incoming-timer { animation: pulse 2s infinite; color: #31d785; font-weight: 700; font-size: 11px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        input[type="range"] { accent-color: #31d785; }
    </style>
</head>
<body class="pb-28">

    <header class="px-5 pt-6 flex justify-between items-center">
        <div class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center">
            <i class="fa-solid fa-gear text-sm"></i>
        </div>
        <div class="flex items-center space-x-2 bg-zinc-800/60 px-4 py-1.5 rounded-full border border-zinc-700/30">
            <span class="text-[13px] font-bold">Main Wallet</span>
            <i class="fa-solid fa-chevron-down text-[10px] opacity-40"></i>
        </div>
        <div class="flex space-x-5 text-zinc-400">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-expand"></i>
        </div>
    </header>

    <div class="mt-8 text-center px-5">
        <h1 id="main-total" class="text-[42px] font-bold tracking-tight">$0.00</h1>
    </div>

    <div class="grid grid-cols-4 gap-2 px-6 mt-8">
        <button onclick="openModal('Send')" class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-up"></i></div>
            <span class="text-xs font-medium">Send</span>
        </button>
        <button class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-down"></i></div>
            <span class="text-xs font-medium">Receive</span>
        </button>
        <button class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-repeat"></i></div>
            <span class="text-xs font-medium">Swap</span>
        </button>
        <button onclick="openModal('Buy')" class="flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-plus"></i></div>
            <span class="text-xs font-medium">Buy</span>
        </button>
    </div>

    <div class="flex px-6 mt-10 border-b border-zinc-900 text-[13px] font-bold text-zinc-500 gap-6">
        <div class="pb-3 border-b-2 border-green-500 text-white">Crypto</div>
        <div class="pb-3">Watchlist</div>
        <div class="pb-3">NFTs</div>
        <div class="pb-3"><i class="fa-solid fa-clock-rotate-left"></i></div>
        <div class="pb-3"><i class="fa-solid fa-sliders"></i></div>
    </div>

    <div id="crypto-list" class="px-6 mt-6 space-y-6">
        </div>

    <div class="px-6 mt-12 pb-10">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-lg font-bold">Recent Activity</h3>
            <button onclick="reset()" class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Reset</button>
        </div>
        <div id="history-list" class="space-y-6"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0d0d0d] border-t border-zinc-900 h-20 flex justify-around items-center px-2 z-50">
        <div class="flex flex-col items-center nav-active">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Trending</span>
        </div>
        <div class="flex flex-col items-center trade-btn-container">
            <div class="trade-btn">
                <i class="fa-solid fa-right-left"></i>
            </div>
            <span class="text-[10px] mt-1 font-bold text-zinc-500">Trade</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-gift text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Rewards</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Discover</span>
        </div>
    </nav>

    <div id="txModal" class="modal" onclick="if(event.target==this) closeTx()">
        <div class="modal-content">
            <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-6"></div>
            <h2 id="modalTitle" class="text-xl font-bold mb-6">Buy Asset</h2>
            
            <div class="space-y-5">
                <select id="assetSelect" class="w-full bg-zinc-900 p-4 rounded-xl font-bold outline-none border border-zinc-800">
                    <option value="USDT">USDT (Tether)</option>
                    <option value="BTC">BTC (Bitcoin)</option>
                    <option value="ETH">ETH (Ethereum)</option>
                    <option value="SOL">SOL (Solana)</option>
                </select>
                
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                    <div class="flex justify-between text-[11px] font-bold text-zinc-500 uppercase mb-3">
                        <span>Speed</span>
                        <span id="timerLabel" class="trust-green">30s</span>
                    </div>
                    <input type="range" id="timerSlider" min="5" max="60" value="30" class="w-full" oninput="document.getElementById('timerLabel').innerText = this.value + 's'">
                </div>

                <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-transparent text-center text-4xl font-bold outline-none py-4">
                
                <button onclick="submitTx()" class="w-full bg-green-500 text-black py-4 rounded-full font-bold text-lg">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const COINS = {
            BTC: { name: 'Bitcoin', price: 70848, icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            ETH: { name: 'Ethereum', price: 2160, icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
            SOL: { name: 'Solana', price: 91.50, icon: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
            USDT: { name: 'Tether', price: 1.00, icon: 'https://cryptologos.cc/logos/tether-usdt-logo.png' }
        };

        let state = JSON.parse(localStorage.getItem('trust_db_v2')) || { balances: { USDT: 0, BTC: 0, ETH: 0, SOL: 0 }, history: [] };
        let activeMode = '';

        function openModal(mode) {
            activeMode = mode;
            document.getElementById('modalTitle').innerText = mode + " Crypto";
            document.getElementById('txModal').classList.add('active');
        }

        function closeTx() { document.getElementById('txModal').classList.remove('active'); }

        function submitTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerSlider').value);

            if(!amt || amt <= 0) return;

            const tx = {
                id: Date.now(),
                type: activeMode,
                coin,
                amt,
                status: 'pending',
                timeLeft: seconds,
                target: Date.now() + (seconds * 1000),
                timeStr: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            state.history.push(tx);
            save();
            closeTx();
            document.getElementById('txAmount').value = '';
        }

        function save() { localStorage.setItem('trust_db_v2', JSON.stringify(state)); render(); }

        function render() {
            let total = 0;
            const list = document.getElementById('crypto-list');
            list.innerHTML = '';

            for(let c in state.balances) {
                const usdValue = state.balances[c] * COINS[c].price;
                total += usdValue;
                list.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <img src="${COINS[c].icon}" class="w-10 h-10 rounded-full">
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="font-bold uppercase text-[15px]">${c}</span>
                                    <span class="text-xs text-zinc-500 font-medium">${COINS[c].name}</span>
                                </div>
                                <p class="text-xs font-bold text-zinc-500 mt-0.5">$${COINS[c].price.toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-[15px]">${state.balances[c].toLocaleString()}</p>
                            <p class="text-xs text-zinc-500 mt-0.5">$${usdValue.toLocaleString()}</p>
                        </div>
                    </div>`;
            }
            document.getElementById('main-total').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const hist = document.getElementById('history-list');
            hist.innerHTML = state.history.length ? '' : '<p class="text-center py-10 opacity-20 text-[11px] font-bold tracking-widest">EMPTY HISTORY</p>';
            
            state.history.slice(-8).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                hist.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-zinc-800/80 rounded-full flex items-center justify-center">
                                <i class="fa-solid ${tx.type==='Buy'?'fa-arrow-down text-green-500':'fa-arrow-up text-zinc-500'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-[14px] font-bold">${tx.type} ${tx.coin}</p>
                                <p class="text-[11px] text-zinc-600 font-bold">${tx.timeStr}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isPending ? 'text-zinc-600' : (tx.type==='Buy'?'text-green-500':'text-white')}">
                                ${tx.type==='Buy'?'+':'-'}${tx.amt.toLocaleString()}
                            </p>
                            ${isPending ? `<p class="incoming-timer">Incoming Transaction: ${tx.timeLeft}s</p>` : `<p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Completed</p>`}
                        </div>
                    </div>`;
            });
        }

        // Logic Heartbeat (Runs every 1 second)
        setInterval(() => {
            let changed = false;
            const now = Date.now();
            
            state.history.forEach(tx => {
                if(tx.status === 'pending') {
                    tx.timeLeft = Math.max(0, Math.ceil((tx.target - now) / 1000));
                    if(tx.timeLeft <= 0) {
                        tx.status = 'confirmed';
                        state.balances[tx.coin] += (tx.type === 'Buy' ? tx.amt : -tx.amt);
                        changed = true;
                    }
                }
            });

            if(changed) save(); else render();
        }, 1000);

        function reset() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
