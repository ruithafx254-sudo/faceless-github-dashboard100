<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault Pro | Multi-Chain</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root { --trust-green: #05f49c; --bg-black: #000000; --card-grey: #121212; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-black); color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

        /* Realistic Button Press */
        .btn-active:active { transform: scale(0.92); opacity: 0.7; transition: 0.1s; }
        
        /* Smooth Gradient Text for Balances */
        .balance-text { background: linear-gradient(to bottom, #ffffff, #a0a0a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Glassmorphism for Modals */
        .modal-blur { backdrop-filter: blur(20px); background: rgba(18, 18, 18, 0.8); }

        /* Animations */
        @keyframes pulse-green { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .pending-glow { animation: pulse-green 1.5s infinite; color: var(--trust-green); }

        .tab-indicator { height: 3px; background: var(--trust-green); border-radius: 10px; transition: 0.3s; }
        
        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <div class="max-w-md mx-auto min-vh-100 flex flex-col">
        
        <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-black/80 backdrop-blur-md z-40">
            <div class="w-10 h-10 bg-[#1e1e1e] rounded-full flex items-center justify-center btn-active">
                <i class="fa-solid fa-gear text-gray-400"></i>
            </div>
            <div class="flex items-center space-x-2 bg-[#1e1e1e] px-4 py-2 rounded-full border border-white/5 btn-active">
                <span class="text-xs font-bold tracking-tight">Main Wallet 1</span>
                <i class="fa-solid fa-chevron-down text-[10px] text-gray-500"></i>
            </div>
            <div class="w-10 h-10 bg-[#1e1e1e] rounded-full flex items-center justify-center btn-active">
                <i class="fa-solid fa-qrcode text-gray-400"></i>
            </div>
        </header>

        <section class="px-6 py-8 text-center">
            <p class="text-gray-500 text-sm font-medium mb-1">Total Balance</p>
            <div class="flex justify-center items-baseline space-x-2 mb-2">
                <span class="text-4xl font-extrabold balance-text tabular-nums" id="display-total">$0.00</span>
            </div>
            <div class="inline-flex items-center space-x-1 bg-[#10d078]/10 px-3 py-1 rounded-full">
                <span class="text-[trust-green] text-xs font-bold" id="percent-change">+2.41%</span>
                <i class="fa-solid fa-arrow-trend-up text-[10px] text-[#05f49c]"></i>
            </div>
        </section>

        <section class="flex justify-between px-8 mb-10">
            <div class="flex flex-col items-center space-y-2 group" onclick="vibrate(); openModal('txModal', 'Send')">
                <div class="w-14 h-14 bg-[#1e1e1e] rounded-full flex items-center justify-center text-xl btn-active"><i class="fa-solid fa-arrow-up"></i></div>
                <span class="text-[11px] font-semibold text-gray-400">Send</span>
            </div>
            <div class="flex flex-col items-center space-y-2" onclick="vibrate(); alert('Your wallet address: 0x71C...4f92')">
                <div class="w-14 h-14 bg-[#1e1e1e] rounded-full flex items-center justify-center text-xl btn-active"><i class="fa-solid fa-arrow-down"></i></div>
                <span class="text-[11px] font-semibold text-gray-400">Receive</span>
            </div>
            <div class="flex flex-col items-center space-y-2" onclick="vibrate(); openModal('txModal', 'Swap')">
                <div class="w-14 h-14 bg-[#1e1e1e] rounded-full flex items-center justify-center text-xl btn-active"><i class="fa-solid fa-shuffle"></i></div>
                <span class="text-[11px] font-semibold text-gray-400">Swap</span>
            </div>
            <div class="flex flex-col items-center space-y-2" onclick="vibrate(); openModal('txModal', 'Buy')">
                <div class="w-14 h-14 bg-[#1e1e1e] rounded-full flex items-center justify-center text-xl btn-active text-[#05f49c]"><i class="fa-solid fa-plus"></i></div>
                <span class="text-[11px] font-semibold text-gray-400">Buy</span>
            </div>
        </section>

        <div class="flex px-6 space-x-8 border-b border-white/5">
            <div class="relative pb-4">
                <span class="text-sm font-bold text-white">Crypto</span>
                <div class="absolute bottom-0 left-0 w-full tab-indicator"></div>
            </div>
            <span class="text-sm font-bold text-gray-600 pb-4">NFTs</span>
        </div>

        <div id="asset-list" class="flex-1 px-6 divide-y divide-white/5 pb-32">
            </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/5 px-8 pt-4 pb-8 flex justify-between items-center z-50">
            <div class="flex flex-col items-center space-y-1 text-[#05f49c]">
                <i class="fa-solid fa-wallet text-xl"></i>
                <span class="text-[10px] font-bold">Wallet</span>
            </div>
            <div class="flex flex-col items-center space-y-1 text-gray-600">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-[10px] font-bold">Discover</span>
            </div>
            <div class="flex flex-col items-center space-y-1 text-gray-600">
                <i class="fa-solid fa-browser text-xl"></i>
                <span class="text-[10px] font-bold">Browser</span>
            </div>
            <div class="flex flex-col items-center space-y-1 text-gray-600">
                <i class="fa-solid fa-gear text-xl"></i>
                <span class="text-[10px] font-bold">Settings</span>
            </div>
        </nav>
    </div>

    <div id="txModal" class="fixed inset-0 z-[100] hidden modal-blur items-end">
        <div class="bg-[#121212] w-full rounded-t-[2.5rem] p-8 border-t border-white/10 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-800 rounded-full mx-auto mb-8"></div>
            
            <h2 id="modalTitle" class="text-2xl font-bold mb-2">Buy Crypto</h2>
            <p class="text-gray-500 text-sm mb-8">Confirm asset and amount</p>

            <div class="space-y-6">
                <div class="bg-[#1e1e1e] rounded-2xl p-4">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Select Asset</label>
                    <select id="assetSelect" class="w-full bg-transparent text-lg font-bold outline-none pt-2">
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="USDT">Tether (USDT)</option>
                    </select>
                </div>

                <div class="bg-[#1e1e1e] rounded-2xl p-4">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Amount (USD)</label>
                    <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-transparent text-3xl font-bold outline-none pt-2 tabular-nums" autofocus>
                </div>

                <div class="bg-[#1e1e1e] rounded-2xl p-4">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Blockchain Delay (Sec)</label>
                    <input type="number" id="waitTime" value="15" class="w-full bg-transparent text-lg font-bold outline-none pt-1">
                </div>

                <div class="pt-4 flex space-x-4">
                    <button onclick="closeModal('txModal')" class="flex-1 bg-gray-800 py-4 rounded-2xl font-bold text-gray-300 btn-active">Cancel</button>
                    <button id="confirmBtn" onclick="executeRealTransaction()" class="flex-[2] bg-[#05f49c] text-black py-4 rounded-2xl font-black text-lg btn-active">CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const COINS = {
            BTC: { name: 'Bitcoin', price: 70848.06, color: '#F7931A' },
            ETH: { name: 'Ethereum', price: 2451.20, color: '#627EEA' },
            SOL: { name: 'Solana', price: 145.45, color: '#14F195' },
            USDT: { name: 'Tether', price: 1.00, color: '#26A17B' }
        };

        let state = JSON.parse(localStorage.getItem('vaultData')) || { 
            balances: { BTC: 0, ETH: 0, SOL: 0, USDT: 0 }, 
            pending: [] 
        };

        function vibrate() { if(navigator.vibrate) navigator.vibrate(15); }

        function openModal(id, action) {
            vibrate();
            document.getElementById('modalTitle').innerText = action;
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function executeRealTransaction() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const delay = parseInt(document.getElementById('waitTime').value);
            const btn = document.getElementById('confirmBtn');

            if(isNaN(amt) || amt <= 0) return;

            vibrate();
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            setTimeout(() => {
                state.pending.push({ coin, amt: amt / COINS[coin].price, type: 'INCOMING', id: Date.now() });
                save();
                closeModal('txModal');
                
                // Reset Button
                btn.innerHTML = 'CONFIRM';
                btn.disabled = false;
                document.getElementById('txAmount').value = '';

                // Realistic Delay logic
                setTimeout(() => {
                    const tx = state.pending.shift();
                    state.balances[tx.coin] += tx.amt;
                    save();
                    vibrate();
                }, delay * 1000);

            }, 800);
        }

        function save() {
            localStorage.setItem('vaultData', JSON.stringify(state));
            render();
        }

        function render() {
            const list = document.getElementById('asset-list');
            let totalUSD = 0;
            list.innerHTML = '';

            Object.keys(COINS).forEach(symbol => {
                const balance = state.balances[symbol];
                const usdValue = balance * COINS[symbol].price;
                totalUSD += usdValue;

                const isPending = state.pending.some(p => p.coin === symbol);

                list.innerHTML += `
                    <div class="flex justify-between items-center py-5 btn-active">
                        <div class="flex items-center space-x-4">
                            <div class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-xs" style="background: ${COINS[symbol].color}20; color: ${COINS[symbol].color}">
                                ${symbol[0]}
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="font-bold text-[15px]">${COINS[symbol].name}</span>
                                    ${isPending ? '<span class="text-[10px] font-black uppercase pending-glow">Pending...</span>' : ''}
                                </div>
                                <p class="text-xs text-gray-500 font-medium">$${COINS[symbol].price.toLocaleString()} <span class="text-[#05f49c] ml-1">+1.2%</span></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-[15px] tabular-nums">${balance > 0 ? balance.toFixed(4) : '0'}</p>
                            <p class="text-xs text-gray-500 font-medium">$${usdValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </div>
                    </div>
                `;
            });

            // Smooth Balance Counter
            const display = document.getElementById('display-total');
            display.innerText = `$${totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        render();
    </script>
</body>
</html>
