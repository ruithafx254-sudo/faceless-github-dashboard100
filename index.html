<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Wallet Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>
body {
    font-family: 'Inter', sans-serif;
    background: #f6f7fb;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.search {
    background: #eee;
    padding: 10px;
    border-radius: 20px;
    width: 80%;
}

.wallet {
    background: #fff;
    border-radius: 20px;
    padding: 15px;
}

.balance {
    font-size: 26px;
    font-weight: 600;
}

.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.btn {
    background: #eef0f5;
    padding: 10px;
    border-radius: 12px;
    flex: 1;
    margin: 5px;
    text-align: center;
    cursor: pointer;
}

.tabs {
    display: flex;
    margin-top: 20px;
}

.tab {
    margin-right: 15px;
    font-weight: 600;
    cursor: pointer;
}

.active {
    color: blue;
}

.coin {
    background: #fff;
    padding: 15px;
    margin-top: 10px;
    border-radius: 15px;
    display: flex;
    justify-content: space-between;
}

.pending {
    background: #fff3cd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 420px;
    background: #fff;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

.modal {
    position: fixed;
    bottom: -100%;
    left: 0;
    right: 0;
    background: #fff;
    padding: 20px;
    border-radius: 20px 20px 0 0;
    transition: 0.3s;
}

.modal.active { bottom: 0; }

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #3b5cff;
    color: white;
    border: none;
    border-radius: 10px;
}
</style></head><body><div class="container"><div class="topbar">
    <div>⚙️</div>
    <input class="search" placeholder="Search">
</div><div class="wallet">
    <div class="balance">$<span id="balance">0.00</span></div><div class="actions">
    <div class="btn" onclick="openModal('send')">Send</div>
    <div class="btn" onclick="openModal('receive')">Receive</div>
    <div class="btn" onclick="openModal('swap')">Swap</div>
    <div class="btn" onclick="openModal('buy')">Buy</div>
</div>

</div><div class="tabs">
    <div class="tab active">Crypto</div>
    <div class="tab">Watchlist</div>
</div><div class="coin">
    <div>BTC<br><small>$67,162</small></div>
    <div>$0.00</div>
</div><div class="coin">
    <div>USDT<br><small>Demo</small></div>
    <div>$<span id="balance2">0.00</span></div>
</div><div id="pendingList"></div></div><div class="bottom-nav">
    <div>Home</div>
    <div>Trade</div>
    <div>Rewards</div>
</div><div class="modal" id="modal">
    <h3 id="title"></h3>
    <input type="number" id="amount" placeholder="Amount">
    <select id="time">
        <option value="10">10s</option>
        <option value="30">30s</option>
        <option value="60">1 min</option>
        <option value="120">2 min</option>
    </select>
    <button onclick="confirmAction()">Confirm</button>
</div><script>
let balance = parseFloat(localStorage.getItem('bal') || 0);
let type = '';

function update() {
    document.getElementById('balance').innerText = balance.toFixed(2);
    document.getElementById('balance2').innerText = balance.toFixed(2);
    localStorage.setItem('bal', balance);
}

function openModal(t) {
    type = t;
    document.getElementById('modal').classList.add('active');
    document.getElementById('title').innerText = t.toUpperCase();
}

function confirmAction() {
    let amt = parseFloat(document.getElementById('amount').value);
    let time = parseInt(document.getElementById('time').value);

    let div = document.createElement('div');
    div.className = 'pending';
    div.innerText = `${type} $${amt} pending (${time}s)`;

    document.getElementById('pendingList').appendChild(div);

    setTimeout(() => {
        if(type === 'buy') balance += amt;
        if(type === 'send') balance = Math.max(0, balance - amt);

        div.innerText = `${type} $${amt} completed`;
        update();
    }, time * 1000);

    document.getElementById('modal').classList.remove('active');
}

update();
</script></body>
</html>
