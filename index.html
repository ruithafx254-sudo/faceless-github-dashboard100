<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #31d785; }
        .trust-green { color: #31d785; }
        .trust-bg-green { background-color: #31d785; }
        .card-bg { background-color: #1a1a1a; }
        
        /* Floating Trade Button */
        .trade-btn {
            width: 55px; height: 55px; border-radius: 50%;
            background-color: #31d785; color: #000;
            display: flex; align-items: center; justify-center: center;
            box-shadow: 0 4px 15px rgba(49, 215, 133, 0.3);
            position: relative; top: -20px; border: 4px solid #0f0f0f;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; width: 100%; border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem; }

        .incoming-text { animation: blink 1.5s infinite; font-size: 11px; font-weight: 600; color: #31d785; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-24">

    <div class="flex justify-between items-center px-6 pt-4 pb-2 text-xs font-bold">
        <span>22:48</span>
        <div class="flex space-x-1 items-center">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
    </div>

    <header class="px-6 flex justify-between items-center mt-2">
        <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center">
            <i class="fa-solid fa-gear text-sm"></i>
        </div>
        <div class="flex items-center space-x-2 bg-zinc-800/50 px-3 py-1.5 rounded-full border border-zinc-700/50" onclick="alert('Switching Wallets...')">
            <span class="text-xs font-bold">Main Wallet</span>
            <i class="fa-solid fa-chevron-down text-[10px] opacity-50"></i>
        </div>
        <div class="flex space-x-4">
            <i class="fa-solid fa-magnifying-glass opacity-70"></i>
            <i class="fa-solid fa-expand opacity-70"></i>
        </div>
    </header>

    <div class="text-center mt-8">
        <h1 id="total-usd" class="text-4xl font-bold tracking-tight">$0.00</h1>
    </div>

    <div class="flex justify-center space-x-8 mt-8">
        <button onclick="openModal('Send')" class="flex flex-col items-center space-y-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-up"></i></div>
            <span class="text-xs font-medium">Send</span>
        </button>
        <button class="flex flex-col items-center space-y-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-down"></i></div>
            <span class="text-xs font-medium">Receive</span>
        </button>
        <button class="flex flex-col items-center space-y-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-repeat"></i></div>
            <span class="text-xs font-medium">Swap</span>
        </button>
        <button onclick="openModal('Buy')" class="flex flex-col items-center space-y-2">
            <div class="w-12 h-12 bg-zinc-800 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-plus"></i></div>
            <span class="text-xs font-medium">Buy</span>
        </button>
    </div>

    <div class="flex px-6 space-x-6 mt-10 border-b border-zinc-800 text-sm font-bold text-zinc-500">
        <div class="pb-3 border-b-2 border-green-500 text-white">Crypto</div>
        <div class="pb-3">Watchlist</div>
        <div class="pb-3">NFTs</div>
        <div class="pb-3"><i class="fa-solid fa-clock-rotate-left"></i></div>
    </div>

    <div id="asset-list" class="px-6 mt-4 space-y-6">
        </div>

    <div class="px-6 mt-10">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">History</h3>
            <button onclick="wipe()" class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Reset</button>
        </div>
        <div id="tx-history" class="space-y-5"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0f0f0f] border-t border-zinc-800 h-20 flex justify-around items-center px-2 z-50">
        <div class="flex flex-col items-center nav-active">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Home</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-chart-line text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Trending</span>
        </div>
        <div class="flex flex-col items-center">
            <div class="trade-btn">
                <i class="fa-solid fa-right-left"></i>
            </div>
            <span class="text-[10px] -mt-3 font-bold text-zinc-500">Trade</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-gift text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Rewards</span>
        </div>
        <div class="flex flex-col items-center text-zinc-500">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Discover</span>
        </div>
    </nav>

    <div id="txModal" class="modal" onclick="if(event.target==this) closeTx()">
        <div class="modal-content">
            <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-6"></div>
            <h2 id="modalTitle" class="text-xl font-bold mb-6">Transaction</h2>
            
            <div class="space-y-4">
                <select id="assetSelect" class="w-full bg-zinc-900 p-4 rounded-xl outline-none font-bold">
                    <option value="USDT">USDT (Tether)</option>
                    <option value="BTC">BTC (Bitcoin)</option>
                    <option value="ETH">ETH (Ethereum)</option>
                    <option value="SOL">SOL (Solana)</option>
                </select>
                
                <div class="bg-zinc-900 p-4 rounded-xl">
                    <label class="text-[10px] text-zinc-500 font-bold uppercase mb-2 block">Set Confirmation Time</label>
                    <input type="range" id="timerInput" min="5" max="60" value="30" class="w-full accent-green-500" oninput="document.getElementById('timerVal').innerText = this.value + 's'">
                    <div class="flex justify-between mt-1 text-[10px] font-bold text-zinc-400">
                        <span>5s</span>
                        <span id="timerVal" class="text-green-500">30s</span>
                        <span>60s</span>
                    </div>
                </div>

                <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-zinc-900 p-4 rounded-xl text-2xl font-bold outline-none text-center">
                
                <button onclick="submitTx()" class="w-full bg-green-500 text-black py-4 rounded-full font-bold text-lg mt-2">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const PRICES = { USDT: 1.00, BTC: 70848.00, ETH: 2160.00, SOL: 91.50 };
        const ICONS = {
            BTC: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png',
            ETH: 'https://cryptologos.cc/logos/ethereum-eth-logo.png',
            SOL: 'https://cryptologos.cc/logos/solana-sol-logo.png',
            USDT: 'https://cryptologos.cc/logos/tether-usdt-logo.png'
        };

        let state = JSON.parse(localStorage.getItem('trust_v1')) || { balances: { USDT: 0, BTC: 0, ETH: 0, SOL: 0 }, history: [] };
        let currentAction = '';

        function openModal(action) {
            currentAction = action;
            document.getElementById('modalTitle').innerText = action + " Crypto";
            document.getElementById('txModal').classList.add('active');
        }

        function closeTx() { document.getElementById('txModal').classList.remove('active'); }

        function submitTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerInput').value);
            
            if(!amt || amt <= 0) return;

            const tx = {
                id: Date.now(),
                type: currentAction,
                coin,
                amt,
                status: 'pending',
                timeLeft: seconds,
                target: Date.now() + (seconds * 1000),
                timeStr: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            state.history.push(tx);
            save();
            closeTx();
            document.getElementById('txAmount').value = '';
        }

        function save() { localStorage.setItem('trust_v1', JSON.stringify(state)); render(); }

        function render() {
            let total = 0;
            const assetBox = document.getElementById('asset-list');
            assetBox.innerHTML = '';

            for(let c in state.balances) {
                const usd = state.balances[c] * PRICES[c];
                total += usd;
                assetBox.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <img src="${ICONS[c]}" class="w-10 h-10 rounded-full">
                            <div>
                                <div class="flex items-center space-x-2">
                                    <span class="font-bold uppercase">${c}</span>
                                    <span class="text-xs text-zinc-500">${c === 'BTC' ? 'Bitcoin' : c}</span>
                                </div>
                                <p class="text-xs font-bold text-zinc-500 mt-0.5">$${PRICES[c].toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">${state.balances[c].toLocaleString()}</p>
                            <p class="text-xs text-zinc-500 mt-0.5">$${usd.toLocaleString()}</p>
                        </div>
                    </div>`;
            }
            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const histBox = document.getElementById('tx-history');
            histBox.innerHTML = state.history.length ? '' : '<p class="text-center py-10 opacity-20 text-xs font-bold">NO HISTORY</p>';
            
            state.history.slice(-10).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                histBox.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center">
                                <i class="fa-solid ${tx.type==='Buy'?'fa-arrow-down text-green-500':'fa-arrow-up text-zinc-400'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold tracking-tight">${tx.type} ${tx.coin}</p>
                                <p class="text-[10px] text-zinc-500 font-bold">${tx.timeStr}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isPending ? 'text-zinc-600' : (tx.type==='Buy'?'text-green-500':'text-white')}">
                                ${tx.type==='Buy'?'+':'-'}${tx.amt.toLocaleString()}
                            </p>
                            ${isPending ? `<p class="incoming-text">Incoming Transaction: ${tx.timeLeft}s</p>` : `<p class="text-[9px] text-zinc-600 font-black uppercase tracking-widest">Completed</p>`}
                        </div>
                    </div>`;
            });
        }

        // --- GLOBAL ENGINE ---
        setInterval(() => {
            let changed = false;
            const now = Date.now();
            
            state.history.forEach(tx => {
                if(tx.status === 'pending') {
                    tx.timeLeft = Math.max(0, Math.ceil((tx.target - now) / 1000));
                    if(tx.timeLeft <= 0) {
                        tx.status = 'confirmed';
                        state.balances[tx.coin] += (tx.type === 'Buy' ? tx.amt : -tx.amt);
                        changed = true;
                    }
                }
            });

            if(changed) save(); else render();
        }, 1000);

        function wipe() { if(confirm("Clear data?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
