<script>
    const COINS = {
        BTC: { name: 'Bitcoin', price: 70848, icon: 'fa-bitcoin', colorClass: 'bg-btc' },
        ETH: { name: 'Ethereum', price: 2160, icon: 'fa-ethereum', colorClass: 'bg-eth' },
        SOL: { name: 'Solana', price: 91.50, icon: 'fa-bolt', colorClass: 'bg-sol' },
        USDT: { name: 'Tether', price: 1.00, icon: 'fa-dollar-sign', colorClass: 'bg-usdt' }
    };

    let state = JSON.parse(localStorage.getItem('trust_fixed_v1')) || { balances: { USDT: 0, BTC: 0, ETH: 0, SOL: 0 }, history: [] };
    let activeMode = '';
    let currentTotalDisplayed = 0; // Track the current visual total

    // Helper function to animate the counter
    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = progress * (end - start) + start;
            obj.innerHTML = `$${currentVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function toggleTheme() {
        const body = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            icon.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.add('light-mode');
            icon.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('theme', 'light');
        }
    }

    if (localStorage.getItem('theme') === 'light') {
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
    }

    function openModal(mode) {
        activeMode = mode;
        document.getElementById('modalTitle').innerText = mode + " Crypto";
        document.getElementById('txModal').classList.add('active');
    }

    function closeTx() { document.getElementById('txModal').classList.remove('active'); }

    function submitTx() {
        const coin = document.getElementById('assetSelect').value;
        const amt = parseFloat(document.getElementById('txAmount').value);
        const seconds = parseInt(document.getElementById('timerSlider').value);
        if(!amt || amt <= 0) return;

        state.history.push({
            id: Date.now(),
            type: activeMode,
            coin,
            amt,
            status: 'pending',
            timeLeft: seconds,
            target: Date.now() + (seconds * 1000),
            timeStr: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        save();
        closeTx();
        document.getElementById('txAmount').value = '';
    }

    function save() { localStorage.setItem('trust_fixed_v1', JSON.stringify(state)); render(); }

    function render() {
        let total = 0;
        const list = document.getElementById('crypto-list');
        list.innerHTML = '';

        for(let c in state.balances) {
            const usdValue = state.balances[c] * COINS[c].price;
            total += usdValue;
            list.innerHTML += `
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <div class="coin-icon ${COINS[c].colorClass}"><i class="fa-brands ${COINS[c].icon === 'fa-bitcoin' ? 'fa-bitcoin' : (COINS[c].icon === 'fa-ethereum' ? 'fa-ethereum' : 'fa-solid ' + COINS[c].icon)}"></i></div>
                        <div>
                            <div class="flex items-center space-x-2">
                                <span class="font-bold text-[15px] uppercase text-current">${c}</span>
                                <span class="text-xs text-zinc-500 font-medium">${COINS[c].name}</span>
                            </div>
                            <p class="text-[13px] font-bold text-zinc-500 mt-0.5">$${COINS[c].price.toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-[15px] tabular-nums text-current">${state.balances[c].toLocaleString()}</p>
                        <p class="text-[13px] text-zinc-500 mt-0.5 tabular-nums">$${usdValue.toLocaleString()}</p>
                    </div>
                </div>`;
        }

        // Animate the main total if it changed
        const totalDisplay = document.getElementById('main-total');
        if (total !== currentTotalDisplayed) {
            animateValue(totalDisplay, currentTotalDisplayed, total, 800); // 800ms animation
            currentTotalDisplayed = total;
        }

        const hist = document.getElementById('history-list');
        hist.innerHTML = state.history.length ? '' : '<p class="text-center py-10 opacity-20 text-[11px] font-bold tracking-widest">NO RECENT ACTIVITY</p>';
        
        state.history.slice(-8).reverse().forEach(tx => {
            const isPending = tx.status === 'pending';
            hist.innerHTML += `
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800">
                            <i class="fa-solid ${tx.type==='Buy'?'fa-arrow-down text-green-500':'fa-arrow-up text-zinc-500'} text-[10px]"></i>
                        </div>
                        <div>
                            <p class="text-[14px] font-bold text-current">${tx.type} ${tx.coin}</p>
                            <p class="text-[11px] text-zinc-600 font-bold">${tx.timeStr}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold tabular-nums ${isPending ? 'text-zinc-600' : (tx.type==='Buy'?'text-green-500':'text-current')}">
                            ${tx.type==='Buy'?'+':'-'}${tx.amt.toLocaleString()}
                        </p>
                        ${isPending ? `<p class="incoming-timer">Incoming Transaction: ${tx.timeLeft}s</p>` : `<p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Completed</p>`}
                    </div>
                </div>`;
        });
    }

    setInterval(() => {
        let changed = false;
        const now = Date.now();
        state.history.forEach(tx => {
            if(tx.status === 'pending') {
                tx.timeLeft = Math.max(0, Math.ceil((tx.target - now) / 1000));
                if(tx.timeLeft <= 0) {
                    tx.status = 'confirmed';
                    state.balances[tx.coin] += (tx.type === 'Buy' ? tx.amt : -tx.amt);
                    changed = true;
                }
            }
        });
        if(changed) save(); else render();
    }, 1000);

    function reset() { if(confirm("Wipe data?")) { localStorage.clear(); location.reload(); } }
    render();
</script>
