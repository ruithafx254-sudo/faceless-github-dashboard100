<!DOCTYPE html><html lang="en">

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: white;
}

.card {
    background: #111;
    border: 1px solid #1f1f1f;
    border-radius: 16px;

.coin-row {

    padding: 24px;
    animation: slideUp 0.25s ease;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.trade-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #31d785;
    display: flex;
    align-items: center;
    justify-content: center;
    color: black;
    border: 4px solid black;
}

</header><div class="mt-10 text-center">

</div><div class="flex justify-center space-x-8 mt-8">

</button>

<button onclick="openModal('Buy')" class="flex flex-col items-center">

</div><div id="crypto-list" class="px-6 mt-8 space-y-3"></div><div class="px-6 mt-10">

</div><nav class="fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center bg-black border-t border-zinc-800">

        <span class="text-xs">Home</span>
    </div>

</nav><!-- KEEPING YOUR ORIGINAL LOGIC EXACTLY --><script>
