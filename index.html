<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vault | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --bg: #05070a; --card: #12141a; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; overflow-x: hidden; }
        
        .app-shell { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; background: var(--bg); }
        
        /* Glass & Shadows */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .haptic:active { transform: scale(0.96); opacity: 0.9; }
        
        /* Modal Animation */
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-sheet { background: #1c1f26; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1); }
        .modal.active .modal-sheet { transform: translateY(0); }

        /* Price Flicker Effect */
        .price-up { color: #10b981; animation: flash-green 1s; }
        .price-down { color: #ef4444; animation: flash-red 1s; }
        @keyframes flash-green { from { background: rgba(16, 185, 129, 0.2); } to { background: transparent; } }
        @keyframes flash-red { from { background: rgba(239, 68, 68, 0.2); } to { background: transparent; } }
    </style>
</head>
<body>

    <div class="app-shell px-6 pt-12 pb-32">
        
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <div class="w-11 h-11 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-bolt-lightning text-white text-lg"></i>
                </div>
                <div>
                    <h2 class="text-sm font-extrabold tracking-tight">Personal Wallet</h2>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Multi-Chain Active</p>
                </div>
            </div>
            <div class="flex space-x-4 opacity-60">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
        </div>

        <div class="relative overflow-hidden glass rounded-[2.5rem] p-8 mb-10 text-center">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Portfolio Value</p>
            <h1 id="total-usd" class="text-5xl font-extrabold tracking-tighter mb-8 tabular-nums">$0.00</h1>
            
            <div class="flex justify-around">
                <button onclick="openAction('Buy')" class="haptic flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-xl shadow-xl shadow-blue-600/20"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-[11px] font-bold opacity-80">Buy</span>
                </button>
                <button onclick="openAction('Send')" class="haptic flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center text-xl border border-white/10"><i class="fa-solid fa-arrow-up"></i></div>
                    <span class="text-[11px] font-bold opacity-80">Send</span>
                </button>
                <button class="haptic flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center text-xl border border-white/10"><i class="fa-solid fa-qrcode"></i></div>
                    <span class="text-[11px] font-bold opacity-80">Receive</span>
                </button>
            </div>
        </div>

        <div class="space-y-4 mb-10">
            <div class="flex justify-between items-center px-2">
                <h3 class="font-extrabold text-lg">My Assets</h3>
                <i class="fa-solid fa-chart-line text-blue-500"></i>
            </div>
            <div id="asset-container" class="space-y-3">
                </div>
        </div>

        <div class="px-2">
            <h3 class="font-extrabold text-lg mb-4">Activity</h3>
            <div id="activity-list" class="space-y-5">
                </div>
        </div>

    </div>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] glass border-t-0 rounded-t-[2.5rem] px-10 py-6 flex justify-between items-center z-50">
        <i class="fa-solid fa-wallet text-blue-500 text-xl"></i>
        <i class="fa-solid fa-arrow-right-arrow-left text-gray-500 text-xl"></i>
        <i class="fa-solid fa-compass text-gray-500 text-xl"></i>
        <i class="fa-solid fa-clock-rotate-left text-gray-500 text-xl"></i>
    </nav>

    <div id="actionModal" class="modal" onclick="if(event.target == this) closeAction()">
        <div class="modal-sheet">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-8"></div>
            <h2 id="actionTitle" class="text-2xl font-black mb-6 tracking-tight">Action</h2>
            
            <div class="space-y-5">
                <select id="coinSelect" class="w-full bg-gray-900/50 p-5 rounded-2xl outline-none border border-white/10 font-bold">
                    <option value="USDT">Tether (USDT)</option>
                    <option value="SOL">Solana (SOL)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                </select>
                <input type="text" id="addressInput" placeholder="Recipient Wallet Address" class="hidden w-full bg-gray-900/50 p-5 rounded-2xl outline-none border border-white/10 text-sm font-mono">
                <input type="number" id="amountInput" placeholder="0.00" class="w-full bg-gray-900/50 p-5 rounded-2xl outline-none border border-white/10 text-3xl font-black tabular-nums">
                
                <button onclick="confirmTransaction()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-2xl shadow-blue-600/30 haptic mt-4">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const COINS = {
            USDT: { name: 'Tether', icon: 'fa-dollar-sign', color: 'bg-green-500', price: 1.00 },
            SOL: { name: 'Solana', icon: 'fa-s', color: 'bg-black', price: 148.25 },
            ETH: { name: 'Ethereum', icon: 'fa-brands fa-ethereum', color: 'bg-indigo-500', price: 2640.10 },
            BTC: { name: 'Bitcoin', icon: 'fa-brands fa-bitcoin', color: 'bg-orange-500', price: 68420.50 }
        };

        let db = JSON.parse(localStorage.getItem('nexus_vault')) || {
            balances: { USDT: 0, SOL: 0, ETH: 0, BTC: 0 },
            history: []
        };

        let currentAction = '';

        function openAction(type) {
            currentAction = type;
            document.getElementById('actionTitle').innerText = type + " Assets";
            document.getElementById('addressInput').style.display = (type === 'Send') ? 'block' : 'none';
            document.getElementById('actionModal').classList.add('active');
        }

        function closeAction() { document.getElementById('actionModal').classList.remove('active'); }

        function render() {
            let total = 0;
            const container = document.getElementById('asset-container');
            container.innerHTML = '';

            for(let key in COINS) {
                const bal = db.balances[key];
                const usd = bal * COINS[key].price;
                total += usd;

                container.innerHTML += `
                    <div class="glass p-5 rounded-3xl flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 ${COINS[key].color} rounded-2xl flex items-center justify-center text-white shadow-lg">
                                <i class="fa-solid ${COINS[key].icon}"></i>
                            </div>
                            <div>
                                <p class="font-black text-sm">${COINS[key].name}</p>
                                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">$${COINS[key].price.toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm tabular-nums">${bal.toFixed(bal > 0 ? 4 : 2)} ${key}</p>
                            <p class="text-[10px] font-bold text-gray-400">$${usd.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                        </div>
                    </div>
                `;
            }

            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const hist = document.getElementById('activity-list');
            hist.innerHTML = db.history.length ? '' : '<p class="text-center text-gray-600 text-[10px] font-bold py-8 uppercase tracking-widest">No recent moves</p>';
            db.history.slice(-4).reverse().forEach(tx => {
                hist.innerHTML += `
                    <div class="flex justify-between items-center opacity-80">
                        <div class="flex items-center space-x-4">
                            <div class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center text-xs">
                                <i class="fa-solid ${tx.type === 'Buy' ? 'fa-arrow-down-long text-green-400' : 'fa-arrow-up-long text-blue-400'}"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold">${tx.type} ${tx.coin}</p>
                                <p class="text-[9px] font-bold text-gray-600 uppercase">${tx.time}</p>
                            </div>
                        </div>
                        <p class="text-xs font-black ${tx.type === 'Buy' ? 'text-green-400' : 'text-white'}">
                            ${tx.type === 'Buy' ? '+' : '-'}${tx.amt} ${tx.coin}
                        </p>
                    </div>
                `;
            });
        }

        function confirmTransaction() {
            const coin = document.getElementById('coinSelect').value;
            const amt = parseFloat(document.getElementById('amountInput').value);

            if(!amt || amt <= 0) return;
            if(currentAction === 'Send' && db.balances[coin] < amt) return alert("Insufficient balance");

            db.balances[coin] += (currentAction === 'Buy' ? amt : -amt);
            db.history.push({
                type: currentAction,
                coin: coin,
                amt: amt,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });

            localStorage.setItem('nexus_vault', JSON.stringify(db));
            render();
            closeAction();
            document.getElementById('amountInput').value = '';
        }

        // Fake live price movement
        setInterval(() => {
            const el = document.getElementById('total-usd');
            const direction = Math.random() > 0.5 ? 1 : -1;
            el.classList.add(direction > 0 ? 'price-up' : 'price-down');
            setTimeout(() => el.classList.remove('price-up', 'price-down'), 1000);
        }, 5000);

        render();
    </script>
</body>
</html>
