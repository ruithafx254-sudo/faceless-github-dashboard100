<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vault | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #040608; --card: #11141b; --blue: #3b82f6; --green: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; }
        
        .app-shell { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .btn-active:active { transform: scale(0.92); opacity: 0.7; transition: 0.1s; }
        
        /* Modal Engine */
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); align-items: flex-end; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-sheet { background: #161a22; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2.5rem; transform: translateY(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.active .modal-sheet { transform: translateY(0); }

        /* Loader Animation */
        .loader-ring { width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(59, 130, 246, 0.1); border-top-color: var(--blue); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

    <div class="app-shell px-6 pt-14 pb-32">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/20">
                    <i class="fa-solid fa-vanguard text-white text-xl"></i>
                </div>
                <div>
                    <h2 class="text-base font-extrabold tracking-tight">Vault Platinum</h2>
                    <div class="flex items-center space-x-1">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Nodes Synced</p>
                    </div>
                </div>
            </div>
            <i class="fa-solid fa-fingerprint text-2xl text-blue-500/40"></i>
        </div>

        <div class="glass rounded-[3rem] p-10 mb-10 text-center relative overflow-hidden">
            <div class="absolute inset-0 shimmer opacity-50"></div>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-[0.2em] mb-3">Total Net Worth</p>
            <h1 id="total-usd" class="text-5xl font-extrabold tracking-tighter mb-10 tabular-nums">$0.00</h1>
            
            <div class="flex justify-between px-2">
                <button onclick="openModal('Buy')" class="btn-active flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-[11px] font-bold">Buy</span>
                </button>
                <button onclick="openModal('Send')" class="btn-active flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-arrow-up"></i></div>
                    <span class="text-[11px] font-bold">Send</span>
                </button>
                <button class="btn-active flex flex-col items-center gap-2">
                    <div class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-qrcode"></i></div>
                    <span class="text-[11px] font-bold">Receive</span>
                </button>
            </div>
        </div>

        <h3 class="text-lg font-extrabold mb-5 px-2">Portfolio</h3>
        <div id="asset-list" class="space-y-3 mb-12">
            </div>

        <h3 class="text-lg font-extrabold mb-5 px-2">History</h3>
        <div id="activity-list" class="space-y-4">
            </div>
    </div>

    <div id="processingOverlay" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center flex-col text-center p-10">
        <div class="loader-ring mb-8"></div>
        <h2 class="text-2xl font-black mb-2 tracking-tight">Validating Node</h2>
        <p class="text-gray-500 text-sm font-medium">Securing transaction on-chain...<br>Please do not close this window.</p>
        <div class="mt-10 w-full bg-white/5 h-1 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-blue-600 w-0 transition-all duration-1000"></div>
        </div>
    </div>

    <div id="actionModal" class="modal" onclick="if(event.target==this) closeAction()">
        <div class="modal-sheet">
            <div class="w-12 h-1 bg-gray-800 rounded-full mx-auto mb-8"></div>
            <h2 id="modalTitle" class="text-2xl font-black mb-6">Action</h2>
            <div class="space-y-4">
                <select id="coinSelect" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold outline-none">
                    <option value="USDT">Tether (USDT)</option>
                    <option value="SOL">Solana (SOL)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                </select>
                <input type="text" id="addrInput" placeholder="Recipient Address" class="hidden w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-mono text-xs">
                <input type="number" id="amtInput" placeholder="0.00" class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 text-4xl font-black text-center tabular-nums">
                <button onclick="startProcessing()" class="btn-active w-full bg-blue-600 py-5 rounded-3xl font-black text-lg shadow-2xl shadow-blue-500/20 mt-4">Confirm Transaction</button>
            </div>
        </div>
    </div>

    <script>
        const COINS = {
            USDT: { name: 'Tether', price: 1.00, icon: 'fa-dollar-sign', color: 'bg-green-500' },
            SOL: { name: 'Solana', price: 184.50, icon: 'fa-s', color: 'bg-black border border-white/10' },
            ETH: { name: 'Ethereum', price: 3240.12, icon: 'fa-brands fa-ethereum', color: 'bg-indigo-600' },
            BTC: { name: 'Bitcoin', price: 69420.00, icon: 'fa-brands fa-bitcoin', color: 'bg-orange-500' }
        };

        let db = JSON.parse(localStorage.getItem('nexus_elite')) || {
            balances: { USDT: 0, SOL: 0, ETH: 0, BTC: 0 },
            history: []
        };

        let currentType = '';

        function openModal(type) {
            currentType = type;
            document.getElementById('modalTitle').innerText = type + " Crypto";
            document.getElementById('addrInput').style.display = type === 'Send' ? 'block' : 'none';
            document.getElementById('actionModal').classList.add('active');
        }

        function closeAction() { document.getElementById('actionModal').classList.remove('active'); }

        function startProcessing() {
            const amt = parseFloat(document.getElementById('amtInput').value);
            const coin = document.getElementById('coinSelect').value;
            if(!amt || amt <= 0) return;
            if(currentType === 'Send' && db.balances[coin] < amt) return alert("Insufficient Balance");

            closeAction();
            document.getElementById('processingOverlay').style.display = 'flex';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progressBar').style.width = progress + '%';
                if(progress >= 100) {
                    clearInterval(interval);
                    finalizeTransaction(coin, amt);
                }
            }, 1000); // 10 seconds total
        }

        function finalizeTransaction(coin, amt) {
            db.balances[coin] += (currentType === 'Buy' ? amt : -amt);
            db.history.push({
                type: currentType,
                coin: coin,
                amt: amt,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });

            localStorage.setItem('nexus_elite', JSON.stringify(db));
            document.getElementById('processingOverlay').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('amtInput').value = '';
            render();
        }

        function render() {
            let total = 0;
            const assetList = document.getElementById('asset-list');
            assetList.innerHTML = '';

            for(let key in COINS) {
                const bal = db.balances[key];
                const val = bal * COINS[key].price;
                total += val;
                assetList.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center transition hover:bg-white/5">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 ${COINS[key].color} rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid ${COINS[key].icon}"></i></div>
                            <div><p class="font-bold text-sm">${COINS[key].name}</p><p class="text-[10px] text-gray-500 font-bold">$${COINS[key].price.toLocaleString()}</p></div>
                        </div>
                        <div class="text-right"><p class="font-black text-sm">${bal.toFixed(bal > 0 ? 4 : 2)} ${key}</p><p class="text-[10px] text-gray-400 font-bold">$${val.toLocaleString()}</p></div>
                    </div>
                `;
            }
            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const activity = document.getElementById('activity-list');
            activity.innerHTML = db.history.length ? '' : '<p class="text-center text-gray-600 text-xs py-10 uppercase tracking-widest font-bold opacity-30">No Transactions</p>';
            db.history.slice(-5).reverse().forEach(tx => {
                activity.innerHTML += `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i class="fa-solid ${tx.type==='Buy'?'fa-plus text-green-500':'fa-arrow-up text-blue-500'}"></i></div>
                            <div><p class="text-xs font-bold">${tx.type} ${tx.coin}</p><p class="text-[9px] text-gray-600 font-bold">${tx.time}</p></div>
                        </div>
                        <p class="text-xs font-black ${tx.type==='Buy'?'text-green-500':'text-white'}">${tx.type==='Buy'?'+':'-'}${tx.amt} ${tx.coin}</p>
                    </div>
                `;
            });
        }

        render();
    </script>
</body>
</html>
