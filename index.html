<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Vault | Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; }
        
        /* Hidden App Content */
        #app-content { display: none; height: 100vh; overflow-y: auto; }

        /* Lockscreen Overlay */
        #lockscreen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .pin-dot { width: 12px; height: 12px; border: 2px solid #333; border-radius: 50%; transition: 0.2s; }
        .pin-dot.active { background: #31d785; border-color: #31d785; box-shadow: 0 0 10px rgba(49, 215, 133, 0.5); }
        
        .keypad-btn {
            width: 75px; height: 75px; border-radius: 50%; background: #111;
            display: flex; items-center; justify-center; font-size: 24px; font-weight: 600;
            cursor: pointer; transition: 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .keypad-btn:active { background: #222; transform: scale(0.9); }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="lockscreen">
        <div class="mb-12 flex flex-col items-center">
            <div class="w-16 h-16 bg-zinc-900 rounded-2xl flex items-center justify-center mb-6 border border-zinc-800">
                <i class="fa-solid fa-shield-halved text-2xl text-green-500"></i>
            </div>
            <h2 class="text-xl font-bold tracking-tight">Enter Passcode</h2>
            <p class="text-zinc-500 text-xs mt-2 font-medium">Verification required to access wallet</p>
        </div>

        <div id="dot-container" class="flex space-x-6 mb-16">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <button class="keypad-btn" onclick="press(1)">1</button>
            <button class="keypad-btn" onclick="press(2)">2</button>
            <button class="keypad-btn" onclick="press(3)">3</button>
            <button class="keypad-btn" onclick="press(4)">4</button>
            <button class="keypad-btn" onclick="press(5)">5</button>
            <button class="keypad-btn" onclick="press(6)">6</button>
            <button class="keypad-btn" onclick="press(7)">7</button>
            <button class="keypad-btn" onclick="press(8)">8</button>
            <button class="keypad-btn" onclick="press(9)">9</button>
            <div class="w-12"></div>
            <button class="keypad-btn" onclick="press(0)">0</button>
            <button class="text-zinc-500 text-sm font-bold active:opacity-50" onclick="backspace()">DELETE</button>
        </div>
    </div>

    <div id="app-content">
        <div class="p-10 text-center">
            <h1 class="text-3xl font-bold text-green-500">Wallet Unlocked</h1>
            <p class="text-zinc-400 mt-4">Your dashboard code goes here.</p>
            <button onclick="location.reload()" class="mt-10 text-xs text-zinc-600 uppercase font-black">Lock Wallet</button>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "1234"; // SET YOUR PIN HERE
        let input = "";

        function press(num) {
            if (input.length < 4) {
                input += num;
                updateDots();
                
                if (input.length === 4) {
                    setTimeout(verifyPin, 200);
                }
            }
        }

        function backspace() {
            input = input.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if (i < input.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function verifyPin() {
            if (input === CORRECT_PIN) {
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.body.style.overflow = 'auto';
            } else {
                const container = document.getElementById('dot-container');
                container.classList.add('shake');
                input = "";
                setTimeout(() => {
                    container.classList.remove('shake');
                    updateDots();
                }, 400);
            }
        }
    </script>
</body>
</html>
