<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #0b0e11; --card: #181a20; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; border-radius: 2rem 2rem 0 0; padding: 2rem; }
        
        /* Pending Pulse */
        .status-pending { animation: pulse 1.5s infinite; font-weight: 800; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body>

    <div class="app-container px-5 pt-8 pb-32">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center border-2 border-white/10">
                    <i class="fa-solid fa-shield-halved text-xs"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-none mb-1">Elite Vault</p>
                    <h2 class="text-sm font-bold">Main Portfolio</h2>
                </div>
            </div>
            <button onclick="clearData()" class="text-red-500 text-[10px] font-black opacity-40">WIPE</button>
        </header>

        <section class="text-center mb-10">
            <p class="text-gray-400 text-sm font-medium mb-1">Available Liquidity</p>
            <h1 id="total-usd" class="text-4xl font-extrabold tracking-tight mb-8 tabular-nums">$0.00</h1>
            
            <div class="flex justify-center space-x-10">
                <button onclick="openModal('Buy')" class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-xl shadow-lg shadow-blue-900/40"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-xs font-bold">Deposit</span>
                </button>
                <button onclick="openModal('Send')" class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-gray-800 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-paper-plane"></i></div>
                    <span class="text-xs font-bold">Withdraw</span>
                </button>
            </div>
        </section>

        <div id="asset-list" class="space-y-3 mb-10"></div>

        <section>
            <h3 class="font-bold text-lg mb-4">Activity Log</h3>
            <div id="tx-history" class="space-y-2"></div>
        </section>
    </div>

    <div id="txModal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <div class="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-6"></div>
            <h2 id="modalTitle" class="text-2xl font-black mb-6 italic">TRANSACTION</h2>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Asset & Timer Settings</label>
                    <select id="assetSelect" class="w-full bg-gray-900 p-4 rounded-xl mt-2 border border-gray-800 font-bold">
                        <option value="USDT">Tether (USDT)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between text-[10px] font-bold text-gray-500 uppercase">
                        <span>Confirmation Speed</span>
                        <span id="timerVal" class="text-blue-500">30s</span>
                    </div>
                    <input type="range" id="timerInput" min="5" max="60" value="30" class="w-full mt-4" oninput="document.getElementById('timerVal').innerText = this.value + 's'">
                </div>

                <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-gray-900 p-5 rounded-2xl border border-gray-800 text-3xl font-black text-center outline-none">
                
                <button onclick="processTx()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-900/40">INITIALIZE TX</button>
            </div>
        </div>
    </div>

    <script>
        const PRICES = { USDT: 1, SOL: 145.2, BTC: 64200 };
        let state = JSON.parse(localStorage.getItem('vault_v2')) || { balances: { USDT: 0, SOL: 0, BTC: 0 }, history: [] };
        let activeAction = '';

        function openModal(action) {
            activeAction = action;
            document.getElementById('modalTitle').innerText = action.toUpperCase();
            document.getElementById('txModal').classList.add('active');
        }

        function closeModal() { document.getElementById('txModal').classList.remove('active'); }

        function processTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerInput').value);
            
            if(!amt || amt <= 0) return;

            const txId = Date.now();
            const tx = {
                id: txId,
                type: activeAction,
                coin: coin,
                amt: amt,
                status: 'pending',
                date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                expiry: Date.now() + (seconds * 1000)
            };

            state.history.push(tx);
            save();
            closeModal();
            document.getElementById('txAmount').value = '';

            // Timer Logic
            setTimeout(() => {
                const targetTx = state.history.find(t => t.id === txId);
                if(targetTx) {
                    targetTx.status = 'confirmed';
                    state.balances[coin] += (activeAction === 'Buy' ? amt : -amt);
                    save();
                }
            }, seconds * 1000);
        }

        function save() { localStorage.setItem('vault_v2', JSON.stringify(state)); render(); }

        function render() {
            let total = 0;
            const assetDiv = document.getElementById('asset-list');
            assetDiv.innerHTML = '';
            for(let c in state.balances) {
                const val = state.balances[c] * PRICES[c];
                total += val;
                assetDiv.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center border-l-4 ${state.balances[c] > 0 ? 'border-blue-500' : 'border-transparent'}">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center text-[10px] font-black">${c}</div>
                            <div><p class="font-bold text-sm">${c}</p><p class="text-[10px] text-gray-500">$${PRICES[c].toLocaleString()}</p></div>
                        </div>
                        <div class="text-right"><p class="font-black text-sm">${state.balances[c].toLocaleString()}</p><p class="text-[10px] text-gray-500">$${val.toLocaleString()}</p></div>
                    </div>`;
            }
            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const hist = document.getElementById('tx-history');
            hist.innerHTML = state.history.length ? '' : '<p class="text-center py-10 opacity-20 text-xs">NO ACTIVITY</p>';
            state.history.slice(-10).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                const colorClass = tx.type === 'Buy' ? 'text-green-500' : 'text-blue-400';
                
                hist.innerHTML += `
                    <div class="bg-gray-900/40 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center space-x-4">
                            <div class="w-8 h-8 rounded-lg bg-gray-800 flex items-center justify-center">
                                <i class="fa-solid ${tx.type==='Buy'?'fa-plus text-green-500':'fa-arrow-up text-blue-400'} text-[10px]"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold uppercase tracking-tighter">${tx.type} ${tx.coin}</p>
                                <p class="text-[9px] text-gray-500 font-bold">${tx.date}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${isPending ? 'text-gray-500' : colorClass}">
                                ${tx.type === 'Buy' ? '+' : '-'}${tx.amt.toLocaleString()}
                            </p>
                            ${isPending ? `<p class="status-pending ${colorClass}">Processing...</p>` : `<p class="text-[9px] text-gray-600 font-bold uppercase">Confirmed</p>`}
                        </div>
                    </div>`;
            });
        }

        function clearData() { if(confirm("Reset Vault?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
