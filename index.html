<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault Pro | Elite Multi-Chain</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="./manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { --trust-blue: #3b82f6; --trust-green: #05f49c; --bg: #000000; --card: #121212; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .btn-interact:active { transform: scale(0.94); opacity: 0.8; transition: 0.1s; }
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; }
        
        @keyframes subtle-pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .confirming-text { animation: subtle-pulse 2s infinite; color: var(--trust-green); font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-sheet { background: #121212; width: 100%; border-radius: 32px 32px 0 0; padding: 24px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-top: 1px solid rgba(255,255,255,0.08); }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }

        .balance-gradient { background: linear-gradient(180deg, #FFFFFF 0%, #A5A5A5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="select-none">

    <div class="max-w-md mx-auto min-h-screen flex flex-col px-6">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
                    <i class="fa-solid fa-bolt-lightning text-sm"></i>
                </div>
                <div>
                    <div class="flex items-center space-x-1">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Mainnet Node</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    </div>
                    <h2 class="text-sm font-extrabold">Portfolio 1 <i class="fa-solid fa-chevron-down text-[10px] ml-1 opacity-40"></i></h2>
                </div>
            </div>
            <div class="flex space-x-5 text-gray-400">
                <i class="fa-solid fa-qrcode text-lg btn-interact"></i>
                <i onclick="clearData()" class="fa-solid fa-trash-can text-lg text-red-900/30 btn-interact"></i>
            </div>
        </header>

        <section class="text-center my-6">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2 opacity-60">Total Value</p>
            <h1 id="total-usd" class="text-5xl font-extrabold tracking-tight balance-gradient tabular-nums mb-10">$0.00</h1>
            
            <div class="flex justify-between px-4">
                <div class="flex flex-col items-center space-y-2" onclick="openModal('Deposit')">
                    <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-xl btn-interact"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-[11px] font-bold text-gray-400">Buy</span>
                </div>
                <div class="flex flex-col items-center space-y-2" onclick="openModal('Withdraw')">
                    <div class="w-14 h-14 bg-zinc-900 rounded-full flex items-center justify-center text-xl btn-interact"><i class="fa-solid fa-arrow-up"></i></div>
                    <span class="text-[11px] font-bold text-gray-400">Send</span>
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-zinc-900 rounded-full flex items-center justify-center text-xl btn-interact"><i class="fa-solid fa-arrow-down"></i></div>
                    <span class="text-[11px] font-bold text-gray-400">Receive</span>
                </div>
                <div class="flex flex-col items-center space-y-2">
                    <div class="w-14 h-14 bg-zinc-900 rounded-full flex items-center justify-center text-xl btn-interact"><i class="fa-solid fa-shuffle"></i></div>
                    <span class="text-[11px] font-bold text-gray-400">Swap</span>
                </div>
            </div>
        </section>

        <div class="flex px-2 space-x-6 border-b border-white/5 mb-6">
            <button class="pb-3 border-b-2 border-blue-500 text-sm font-bold">Assets</button>
            <button class="pb-3 text-sm font-bold text-gray-600">History</button>
        </div>

        <div id="asset-list" class="space-y-1 mb-8"></div>

        <section class="mb-32">
            <h3 class="font-bold text-gray-500 text-[10px] uppercase tracking-widest mb-4">Live Activity</h3>
            <div id="tx-history" class="space-y-3"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-xl border-t border-white/5 px-8 pt-4 pb-10 flex justify-between items-center z-50">
            <div class="flex flex-col items-center space-y-1 text-blue-500"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-bold">Wallet</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-600"><i class="fa-solid fa-compass text-xl"></i><span class="text-[10px] font-bold">Explore</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-600"><i class="fa-solid fa-browser text-xl"></i><span class="text-[10px] font-bold">Browser</span></div>
            <div class="flex flex-col items-center space-y-1 text-gray-600"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] font-bold">Settings</span></div>
        </nav>
    </div>

    <div id="txModal" class="modal-overlay" onclick="if(event.target == this) closeModal()">
        <div class="modal-sheet">
            <div class="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-8"></div>
            <h2 id="modalTitle" class="text-2xl font-black mb-8 italic tracking-tighter">NETWORK DEPOSIT</h2>
            
            <div class="space-y-6">
                <div class="glass-card p-4">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Select Asset</label>
                    <select id="assetSelect" class="w-full bg-transparent p-2 text-lg font-bold outline-none">
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="USDT">Tether (USDT)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                    </select>
                </div>

                <div class="glass-card p-4">
                    <div class="flex justify-between items-center mb-4">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Confirmation Time</label>
                        <span id="timerVal" class="text-blue-500 font-bold text-sm">30s</span>
                    </div>
                    <input type="range" id="timerInput" min="10" max="300" value="30" class="w-full" oninput="document.getElementById('timerVal').innerText = this.value + 's'">
                </div>

                <div class="glass-card p-6">
                    <input type="number" id="txAmount" placeholder="0.00" class="w-full bg-transparent text-5xl font-black text-center outline-none tabular-nums">
                </div>
                
                <button onclick="processTx()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg btn-interact shadow-2xl shadow-blue-600/30">CONFIRM TRANSACTION</button>
            </div>
        </div>
    </div>

    <script>
        const PRICES = { USDT: 1, SOL: 145.2, BTC: 64200, ETH: 2450 };
        let state = JSON.parse(localStorage.getItem('elite_vault_v4')) || { balances: { USDT: 0, BTC: 0, SOL: 0, ETH: 0 }, history: [] };
        
        // 1. RUN TIMER CHECKER CONSTANTLY (Even after refresh)
        setInterval(checkPendingTransactions, 1000);

        function openModal(action) {
            document.getElementById('modalTitle').innerText = action.toUpperCase() + ' ASSET';
            document.getElementById('txModal').classList.add('active');
        }

        function closeModal() { document.getElementById('txModal').classList.remove('active'); }

        function processTx() {
            const coin = document.getElementById('assetSelect').value;
            const amt = parseFloat(document.getElementById('txAmount').value);
            const seconds = parseInt(document.getElementById('timerInput').value);
            
            if(!amt || amt <= 0) return;

            const now = Date.now();
            const tx = {
                id: now,
                type: document.getElementById('modalTitle').innerText.split(' ')[0],
                coin: coin,
                amt: amt,
                status: 'pending',
                date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                finishAt: now + (seconds * 1000) // This is the magic "persistence" key
            };

            state.history.push(tx);
            save();
            closeModal();
            document.getElementById('txAmount').value = '';
        }

        function checkPendingTransactions() {
            let changed = false;
            const now = Date.now();

            state.history.forEach(tx => {
                if (tx.status === 'pending') {
                    // Check if the current time has passed the finish time
                    if (now >= tx.finishAt) {
                        tx.status = 'confirmed';
                        const multiplier = (tx.type === 'DEPOSIT' || tx.type === 'BUY') ? 1 : -1;
                        state.balances[tx.coin] += (tx.amt * multiplier);
                        changed = true;
                    }
                }
            });

            if (changed) save();
        }

        function save() { 
            localStorage.setItem('elite_vault_v4', JSON.stringify(state)); 
            render(); 
        }

        function render() {
            let total = 0;
            const assetDiv = document.getElementById('asset-list');
            assetDiv.innerHTML = '';
            
            for(let c in state.balances) {
                const val = state.balances[c] * PRICES[c];
                total += val;
                assetDiv.innerHTML += `
                    <div class="flex justify-between items-center py-5 border-b border-white/[0.03]">
                        <div class="flex items-center space-x-4">
                            <div class="w-11 h-11 bg-zinc-900 rounded-full flex items-center justify-center font-black text-[10px] border border-white/5">${c}</div>
                            <div>
                                <p class="font-bold text-sm text-white">${c}</p>
                                <p class="text-[10px] text-gray-500 font-bold">$${PRICES[c].toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-sm tracking-tight">${state.balances[c].toLocaleString()}</p>
                            <p class="text-[10px] text-gray-500 font-bold">$${val.toLocaleString()}</p>
                        </div>
                    </div>`;
            }

            document.getElementById('total-usd').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const hist = document.getElementById('tx-history');
            hist.innerHTML = state.history.length ? '' : '<div class="py-12 text-center opacity-10 text-xs font-black">NO ACTIVITY</div>';
            
            state.history.slice(-10).reverse().forEach(tx => {
                const isPending = tx.status === 'pending';
                const isPositive = (tx.type === 'DEPOSIT' || tx.type === 'BUY');
                
                // Calculate "Confirming 1/3" based on time left
                let subtext = 'Finalized';
                if(isPending) {
                    const totalTime = (tx.finishAt - tx.id);
                    const elapsed = (Date.now() - tx.id);
                    const progress = Math.min(3, Math.floor((elapsed / totalTime) * 3) + 1);
                    subtext = `Confirming (${progress}/3)...`;
                }

                hist.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center mb-3">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center border border-white/5">
                                <i class="fa-solid ${isPositive ? 'fa-arrow-down text-green-500' : 'fa-arrow-up text-blue-500'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-[11px] font-black uppercase tracking-tight">${tx.type} ${tx.coin}</p>
                                <p class="text-[9px] text-gray-500 font-bold">${tx.date}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${isPending ? 'text-gray-500' : (isPositive ? 'text-green-500' : 'text-white')}">
                                ${isPositive ? '+' : '-'}${tx.amt.toLocaleString()}
                            </p>
                            <p class="${isPending ? 'confirming-text' : 'text-[9px] text-gray-600 font-black uppercase'}">${subtext}</p>
                        </div>
                    </div>`;
            });
        }

        function clearData() { if(confirm("Purge wallet data?")) { localStorage.clear(); location.reload(); } }
        render();
    </script>
</body>
</html>
